<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <title>DeMic WebRemote</title>
    <style>
        .custom-btn {
            display: inline-block;
            padding: 50px;
            margin: 10px;
            width: 160px;
            height: 160px;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            transition: all 0.3s ease;
            background-image: url('/res/loading.png');
            background-size: 85%;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #F0F0F0;
        }

            .custom-btn:not(:disabled):hover {
                transform: scale(1.01);
                box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            }

            .custom-btn:not(:disabled):active {
                transform: scale(0.99);
            }

            .custom-btn:disabled {
                cursor: progress;
                opacity: 0.6;
            }

        .center-div {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class='center-div' style='height:30px'>
        DeMic WebRemote
    </div>
    <div class='center-div' style='height:180px'>
        <button id='toggle-btn' class='custom-btn' onclick='handleClick(this)'></button>
    </div>
    <script>
        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function startStatePolling() {
            let currentStatus = "";
            while (true) {
                try {
                    const response = await fetch(`/wait_state_change?old=${encodeURIComponent(currentStatus)}`);
                    if (!response.ok) {
                        throw new Error('bad status');
                    }
                    currentStatus = await response.text()
                    const btn = document.querySelector('#toggle-btn');
                    if (currentStatus == 'muted') {
                        btn.style.backgroundImage = "url('/res/muted.png')";
                    } else {
                        btn.style.backgroundImage = "url('/res/unmuted.png')";
                    }
                } catch (error) {
                    await sleep(1000); // Retry 1s later.
                }

            }
        }

        async function handleClick(button) {
            button.disabled = true;

            let ok = false;
            try {
                ok = (await fetch('/toggle')).ok;
            } catch (error) {
                console.log(error);
            }
            if (!ok) {
                alert("Server error!")
            }
            button.disabled = false;
        }

        (async function () {
            await sleep(100); // Avoid flickering caused by the initial loading icon.
            startStatePolling();
        })();
    </script>
</body>   

</html>
